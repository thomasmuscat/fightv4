name: FightIQ Data Engine Fix V4

on:
  workflow_dispatch:
    inputs:
      upload_to_supabase:
        description: "Upload data to Supabase"
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

      max_events:
        description: "Nombre maximum d'événements (vide = tous)"
        required: false
        default: "5"

      max_fighters:
        description: "Nombre maximum de fiches combattants (vide = tous)"
        required: false
        default: "20"

      max_fights:
        description: "Nombre maximum de combats (vide = tous)"
        required: false
        default: "50"

jobs:
  scrape:

    runs-on: ubuntu-latest

    timeout-minutes: 360

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run FightIQ Engine
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

          FIGHTIQ_UPLOAD_TO_SUPABASE: ${{ github.event.inputs.upload_to_supabase }}
          FIGHTIQ_MAX_EVENTS: ${{ github.event.inputs.max_events }}
          FIGHTIQ_MAX_FIGHTERS: ${{ github.event.inputs.max_fighters }}
          FIGHTIQ_MAX_FIGHTS: ${{ github.event.inputs.max_fights }}

          FIGHTIQ_SLEEP_SECONDS: "0.8"
          FIGHTIQ_USE_CACHE: "false"

        run: |
          python main.py

      - name: Upload exports
        uses: actions/upload-artifact@v4
        with:
          name: fightiq-v4-exports
          path: exports/

      - name: Upload debug
        uses: actions/upload-artifact@v4
        with:
          name: fightiq-v4-debug
          path: debug/
